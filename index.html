<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Training" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Jazz 8-Week Plan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#0a0a0a; --surface:#111; --surface2:#161616; --border:#1e1e1e;
      --text:#f0f0f0; --muted:#555; --dim:#333;
      --orange:#E8572A; --blue:#2A7BE8; --green:#2AE87B; --yellow:#E8C12A; --purple:#C12AE8;
      --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html,body { background:var(--bg); color:var(--text); font-family:Georgia,serif; height:100%; overflow:hidden; }
    #app { display:flex; flex-direction:column; height:100dvh; padding-top:var(--safe-top); }
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 18px 12px; flex-shrink:0; }
    header .eyebrow { font-size:9px; letter-spacing:4px; color:var(--dim); text-transform:uppercase; margin-bottom:3px; }
    header h1 { font-size:20px; font-weight:bold; letter-spacing:-0.5px; }
    header .sub { font-size:10px; color:var(--muted); margin-top:2px; }
    nav { display:flex; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
    nav button { flex:1; padding:11px 4px; background:none; border:none; color:var(--muted); font-family:Georgia,serif; font-size:11px; cursor:pointer; border-bottom:2px solid transparent; }
    nav button.active { color:var(--orange); border-bottom-color:var(--orange); }
    main { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:calc(16px + var(--safe-bottom)); }
    .label { font-size:9px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; padding:16px 18px 8px; }
    .pills { display:flex; gap:7px; padding:0 18px 4px; overflow-x:auto; scrollbar-width:none; }
    .pills::-webkit-scrollbar { display:none; }
    .pill { flex-shrink:0; padding:7px 13px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-family:Georgia,serif; font-size:12px; cursor:pointer; }
    .week-card { margin:10px 18px 0; padding:14px 16px; background:var(--surface); border-radius:10px; border-left:3px solid var(--muted); }
    .week-card .phase { font-size:9px; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; }
    .week-card .intensity { display:inline-block; font-size:9px; color:var(--dim); background:var(--surface2); padding:3px 8px; border-radius:4px; text-transform:uppercase; margin-bottom:6px; }
    .week-card .note { font-size:12px; color:#666; line-height:1.6; }
    .day-chips { display:flex; gap:7px; padding:0 18px; overflow-x:auto; scrollbar-width:none; }
    .day-chips::-webkit-scrollbar { display:none; }
    .day-chip { flex-shrink:0; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-family:Georgia,serif; font-size:11px; cursor:pointer; text-align:center; line-height:1.5; }
    .day-chip .day-sub { font-size:9px; opacity:0.6; display:block; }
    .day-header { margin:12px 18px 0; padding:16px; border-radius:10px 10px 0 0; border:1px solid transparent; border-bottom:none; }
    .day-header .day-eyebrow { font-size:9px; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; }
    .day-header .day-title { font-size:15px; font-weight:bold; margin-bottom:4px; }
    .day-header .day-note { font-size:11px; color:#666; line-height:1.6; margin-bottom:8px; }
    .day-header .day-meta { font-size:10px; color:var(--dim); display:flex; gap:14px; flex-wrap:wrap; }
    .pec-note { margin:8px 0 0; font-size:11px; color:#E8572A; background:rgba(232,87,42,0.08); padding:8px 10px; border-radius:6px; line-height:1.6; }
    .movements { margin:0 18px; border-radius:0 0 10px 10px; overflow:hidden; border:1px solid transparent; border-top:none; }
    .movement { padding:14px 16px; border-bottom:1px solid #161616; border-left:3px solid transparent; }
    .movement:last-child { border-bottom:none; }
    .movement-top { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .movement-badge { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; padding:2px 6px; border-radius:3px; font-family:monospace; flex-shrink:0; }
    .movement-name { font-size:13px; font-weight:bold; }
    .stats-row { display:flex; gap:18px; margin-bottom:7px; }
    .stat-label { font-size:8px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); margin-bottom:2px; }
    .stat-value { font-size:13px; }
    .movement-target { font-size:11px; color:#444; margin-bottom:8px; }
    .movement-prog { font-size:11px; color:var(--orange); background:rgba(232,87,42,0.06); padding:5px 9px; border-radius:4px; display:inline-block; }
    .card { margin:12px 18px 0; padding:16px; background:var(--surface); border-radius:10px; border:1px solid var(--border); }
    .card-label { font-size:9px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:10px; }
    .rule-row { display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:1px solid #161616; font-size:12px; color:var(--muted); }
    .rule-row:last-child { border-bottom:none; }
    .rule-dot { color:var(--orange); font-size:8px; margin-top:4px; flex-shrink:0; }
    .cardio-card { margin:12px 18px 0; padding:14px 16px; background:rgba(42,123,232,0.06); border:1px solid rgba(42,123,232,0.15); border-radius:10px; }
    .cardio-label { font-size:9px; letter-spacing:2px; color:var(--blue); text-transform:uppercase; margin-bottom:6px; }
    .cardio-text { font-size:12px; color:var(--muted); line-height:1.7; }
    .log-entry { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-top:10px; overflow:hidden; }
    .log-entry-header { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .log-entry-title { font-size:13px; font-weight:bold; }
    .log-entry-date { font-size:10px; color:var(--muted); }
    .log-entry-body { padding:12px 14px; font-size:12px; color:var(--muted); line-height:1.7; }
    .log-form { margin-top:12px; }
    .log-form textarea { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:Georgia,serif; font-size:13px; padding:12px; resize:none; height:100px; outline:none; }
    .log-form textarea:focus { border-color:var(--orange); }
    .log-form button { margin-top:8px; width:100%; padding:13px; background:var(--orange); color:#fff; border:none; border-radius:8px; font-family:Georgia,serif; font-size:14px; font-weight:bold; cursor:pointer; }
    .log-meta { display:flex; gap:8px; margin-bottom:8px; }
    .log-meta select { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:Georgia,serif; font-size:12px; padding:9px 10px; outline:none; }
    .delete-btn { font-size:10px; color:#333; background:none; border:none; cursor:pointer; padding:2px 4px; }
    .empty-log { font-size:13px; color:var(--dim); text-align:center; padding:32px 0; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="eyebrow">BuiltSimple Hybrid · Jazz</div>
    <h1>8-Week Hypertrophy</h1>
    <div class="sub">Barbell · Rings · Pull-up Bar · Dip Bars · Weight Vest · Flat Bench</div>
  </header>
  <nav>
    <button class="active" onclick="showTab('plan',this)">Plan</button>
    <button onclick="showTab('baseline',this)">Baseline</button>
    <button onclick="showTab('log',this)">Log</button>
    <button onclick="showTab('rules',this)">Rules</button>
  </nav>
  <main id="main-content"></main>
</div>
<script>
const WEEKS=[
  {week:1,phase:"Baseline",  intensity:"Moderate",      note:"Learn the movements. Leave 2 reps in reserve every set. Focus on form."},
  {week:2,phase:"Baseline",  intensity:"Moderate",      note:"Repeat Week 1 structure. Log every set. Note how weight feels."},
  {week:3,phase:"Build",     intensity:"Moderate-High", note:"Add 1 set to your key lift. Push closer to failure on top sets."},
  {week:4,phase:"Build",     intensity:"High",          note:"Increase weight 5-10% on key lifts. Rep targets stay the same."},
  {week:5,phase:"Accumulate",intensity:"High",          note:"Rep targets jump to x4 your max. Higher density in sub-max work."},
  {week:6,phase:"Accumulate",intensity:"High",          note:"Push top sets to true failure once per session. Log your PRs."},
  {week:7,phase:"Peak",      intensity:"Very High",     note:"Rep targets at x5 your baseline max. Key lifts near max intensity."},
  {week:8,phase:"Retest",    intensity:"Deload + Test", note:"Drop volume 40%. Retest all 4 baseline movements. Set new targets."},
];
const PC={Baseline:"#555",Build:"#E8572A",Accumulate:"#2A7BE8",Peak:"#C12AE8",Retest:"#2AE87B"};

// Jazz baselines: bench=11@135lb, pull=13, rdl=20@185lb, core=20
function T(key,wi){
  const b={push:11,pull:13,rdl:20,core:20};
  const m=wi<=3?3:wi<=5?4:wi===6?5:null;
  return m?`${b[key]*m} total reps`:"Retest — set new targets";
}

const DAYS=[
  {day:"Day 1",label:"Push",color:"#E8572A",keyLift:"Barbell Bench Press",
   keyNote:"4-5 sets near failure. Controlled descent — stop 2-3 reps short of failure, no grinding at lockout.",pecNote:true,
   movements:[
    {name:"Barbell Bench Press",       type:"KEY",       sets:"4-5",reps:"6-10",   rest:"2-3 min",tf:w=>"Start: 135lb. Log weight + reps every session.",             prog:"+5lb when top of rep range hit all sets"},
    {name:"Dips (BW to Weighted Vest)",type:"SUB-MAX",   sets:"3",  reps:"~8",     rest:"90 sec", tf:w=>"BW to start. Add vest when easy.",                           prog:"Add reps then add vest weight"},
    {name:"Ring Push-Ups",             type:"SUB-MAX",   sets:"3",  reps:"~8",     rest:"90 sec", tf:w=>"Sub-max — controlled reps, no failure.",                     prog:"Lower rings to increase difficulty"},
    {name:"Barbell Overhead Press",    type:"SUB-MAX",   sets:"2",  reps:"~8",     rest:"90 sec", tf:w=>"Start: 85lb. Sub-max — no grinding.",                        prog:"+5lb when reps top out"},
    {name:"Ring Face Pulls",           type:"ACCESSORY", sets:"3",  reps:"15-20",  rest:"60 sec", tf:w=>"Shoulder health — never skip",                                 prog:"Add reps, not difficulty"},
  ]},
  {day:"Day 2",label:"Pull",color:"#2A7BE8",keyLift:"Pull-Ups",
   keyNote:"4-5 sets to near-failure. Baseline: 12 reps. Add vest weight once bodyweight feels easy.",
   movements:[
    {name:"Pull-Ups (BW to Weighted Vest)",     type:"KEY",       sets:"4-5",reps:"Max-2", rest:"2-3 min",tf:w=>`Start: BW. Pull target: ${T("pull",w)} total this session.`, prog:"Add reps then add vest weight"},
    {name:"Barbell Row (Pendlay or Bent-Over)", type:"SUB-MAX",   sets:"4",  reps:"~10",   rest:"90 sec", tf:w=>"Start: 155lb. Sub-max — controlled, no jerking.",         prog:"+5lb when reps top out"},
    {name:"Ring Rows (feet elevated)",          type:"SUB-MAX",   sets:"3",  reps:"~8",    rest:"90 sec", tf:w=>"Sub-max — elevate feet to increase difficulty.",           prog:"Elevate feet higher for difficulty"},
    {name:"Ring Curl (Bicep)",                  type:"SUB-MAX",   sets:"3",  reps:"~8",    rest:"60 sec", tf:w=>"Feel the bicep — no swinging",                            prog:"Adjust body angle for more load"},
    {name:"Ring Face Pulls",                    type:"ACCESSORY", sets:"2",  reps:"15-20", rest:"60 sec", tf:w=>"Shoulder health",                                         prog:"Add reps"},
  ]},
  {day:"Day 3",label:"Legs",color:"#2AE87B",keyLift:"Barbell Back Squat",
   keyNote:"4-5 sets near failure. Full depth. Brace hard.",
   movements:[
    {name:"Barbell Back Squat",            type:"KEY",       sets:"4-5",reps:"6-10",    rest:"2-3 min",tf:w=>"Start: 215lb. Log weight + reps every session.",           prog:"+5-10lb when top of range hit all sets"},
    {name:"Barbell Romanian Deadlift",     type:"SUB-MAX",   sets:"4",  reps:"~10",     rest:"90 sec", tf:w=>`Start: 185lb. RDL target: ${T("rdl",w)} total.`,           prog:"+5lb when reps top out"},
    {name:"Barbell Bulgarian Split Squat", type:"SUB-MAX",   sets:"3",  reps:"~8/leg",  rest:"90 sec", tf:w=>"Start: 95lb. Sub-max — feel the stretch, controlled.",     prog:"Add reps then add barbell load"},
    {name:"Barbell Hip Thrust (on bench)", type:"SUB-MAX",   sets:"3",  reps:"~12",     rest:"90 sec", tf:w=>"Start: 300lb (machine). Full hip extension each rep.", prog:"+weight when reps top out"},
    {name:"Hanging Knee Raises",           type:"ACCESSORY", sets:"3",  reps:"strict",  rest:"60 sec", tf:w=>`Core target: ${T("core",w)} total — no swinging.`,         prog:"Progress to toes-to-bar"},
  ]},
  {day:"Day 4",label:"Upper Hyp.",color:"#E8C12A",keyLift:"Standing BB Overhead Press",
   keyNote:"4-5 sets. Strict — no leg drive. Shoulder and upper chest focus.",
   movements:[
    {name:"Barbell Overhead Press",   type:"KEY",       sets:"4-5",reps:"6-10",  rest:"2-3 min",tf:w=>"Start: 85lb. Log weight + reps every session.",           prog:"+5lb when top range hit all sets"},
    {name:"Weighted Dips (Vest)",     type:"SUB-MAX",   sets:"3",  reps:"~8",    rest:"90 sec", tf:w=>"BW to start. Add vest when easy.",                        prog:"Add vest weight progressively"},
    {name:"Weighted Pull-Ups (Vest)", type:"SUB-MAX",   sets:"3",  reps:"~6",    rest:"90 sec", tf:w=>"BW to start. Add vest when easy.",                        prog:"Add vest weight progressively"},
    {name:"Close-Grip Bench Press",   type:"SUB-MAX",   sets:"3",  reps:"~10",   rest:"90 sec", tf:w=>"Start: 95lb. Tricep focus — controlled lockout.",         prog:"+5lb when reps top out"},
    {name:"Barbell Curl (Strict)",    type:"SUB-MAX",   sets:"3",  reps:"~10",   rest:"60 sec", tf:w=>"Start: 60lb. No swinging.",   prog:"+2.5lb when reps top out"},
  ]},
  {day:"Day 5",label:"Power",color:"#C12AE8",keyLift:"Conventional Deadlift",
   keyNote:"Your heaviest day. 4-5 sets. No same-day cardio — ever.",
   movements:[
    {name:"Conventional Deadlift",                    type:"KEY",       sets:"4-5",reps:"4-6",        rest:"3-4 min",tf:w=>"Start: 225lb. Max effort. Log every set.",    prog:"+5-10lb per week while form holds"},
    {name:"Push-Ups with Weight Vest",                type:"SUB-MAX",   sets:"3",  reps:"~8",         rest:"90 sec", tf:w=>"Sub-max — add vest when BW feels easy.",      prog:"Add vest weight or add reps"},
    {name:"Ring Rows (weighted vest)",                type:"SUB-MAX",   sets:"3",  reps:"~8",         rest:"90 sec", tf:w=>"Sub-max — elevate feet + add vest over time.", prog:"Elevate feet + add vest"},
    {name:"Barbell Front Squat (or Goblet w/ plate)", type:"SUB-MAX",   sets:"3",  reps:"~10",        rest:"90 sec", tf:w=>"Start: 135lb. Upright torso, full depth.",    prog:"+5lb when reps top out"},
    {name:"Ab Wheel / Hanging Toes-to-Bar",           type:"ACCESSORY", sets:"3",  reps:"max quality",rest:"60 sec", tf:w=>`Core target: ${T("core",w)} total.`,          prog:"Add reps each week"},
  ]},
];

const TS={
  KEY:      {border:"#E8572A",badgeBg:"rgba(232,87,42,0.2)",  label:"KEY LIFT"},
  "SUB-MAX":{border:"#2A7BE8",badgeBg:"rgba(42,123,232,0.2)", label:"SUB-MAX"},
  ACCESSORY:{border:"#2AE87B",badgeBg:"rgba(42,232,123,0.2)", label:"ACCESSORY"},
};

let aw=0,ad=0,ct='plan';
function getLogs(){try{return JSON.parse(localStorage.getItem('tLogs')||'[]');}catch(e){return[];}}
function saveLogs(l){localStorage.setItem('tLogs',JSON.stringify(l));}

function render(){
  const m=document.getElementById('main-content');
  if(ct==='plan')     m.innerHTML=rPlan();
  if(ct==='baseline') m.innerHTML=rBaseline();
  if(ct==='log')      m.innerHTML=rLog();
  if(ct==='rules')    m.innerHTML=rRules();
}

function rPlan(){
  const w=WEEKS[aw],d=DAYS[ad],pc=PC[w.phase];
  const wk=WEEKS.map((x,i)=>`<button class="pill" style="${i===aw?`background:${PC[x.phase]}22;border-color:${PC[x.phase]};color:${PC[x.phase]};`:'border-color:#1e1e1e;color:#555;'}" onclick="selW(${i})">W${x.week}</button>`).join('');
  const dc=DAYS.map((x,i)=>`<button class="day-chip" style="${i===ad?`background:${x.color}18;border-color:${x.color};color:${x.color};`:'border-color:#1e1e1e;color:#555;'}" onclick="selD(${i})">${x.day}<span class="day-sub">${x.label}</span></button>`).join('');
  const mv=d.movements.map((m,i)=>{
    const s=TS[m.type],rc=m.type==='KEY'?'#E8572A':'#2A7BE8';
    return `<div class="movement" style="border-left-color:${s.border};background:${i%2===0?'#0d0d0d':'#0a0a0a'}">
      <div class="movement-top"><span class="movement-badge" style="color:${s.border};background:${s.badgeBg}">${s.label}</span><span class="movement-name">${m.name}</span></div>
      <div class="stats-row">
        <div><div class="stat-label">Sets</div><div class="stat-value">${m.sets}</div></div>
        <div><div class="stat-label">Reps</div><div class="stat-value">${m.reps}</div></div>
        <div><div class="stat-label">Rest</div><div class="stat-value" style="color:${rc}">${m.rest}</div></div>
      </div>
      <div class="movement-target">Target: ${m.tf(aw)}</div>
      <div class="movement-prog">up ${m.prog}</div>
    </div>`;
  }).join('');
  return `
    <div class="label">Week</div><div class="pills">${wk}</div>
    <div class="week-card" style="border-left-color:${pc}">
      <div class="phase" style="color:${pc}">${w.phase} Phase</div>
      <div class="intensity">${w.intensity}</div>
      <div class="note">${w.note}</div>
    </div>
    <div class="label">Day</div><div class="day-chips">${dc}</div>
    <div class="day-header" style="background:${d.color}12;border-color:${d.color}33">
      <div class="day-eyebrow" style="color:${d.color}">${d.day} - ${d.label}</div>
      <div class="day-title">Key: ${d.keyLift}</div>
      <div class="day-note">${d.keyNote}</div>
      ${d.pecNote?'<div class="pec-note">Pec tear: stop 2-3 reps short of failure on bench. Control the descent. No bouncing. Sub in dips if it feels off.</div>':''}
      <div class="day-meta" style="margin-top:10px"><span>Total Sets: 10-15 max</span><span>Time: 45-60 min</span></div>
    </div>
    <div class="movements" style="border-color:${d.color}33">${mv}</div>
    <div class="cardio-card"><div class="cardio-label">Cardio (Separate Days)</div><div class="cardio-text">Zone 2 + HIIT on your 2 off days. Never stack cardio same day as Legs or Day 5. Zone 2 = active recovery with a newborn.</div></div>
    <div style="height:8px"></div>`;
}

function rBaseline(){
  const rows=[
    {move:"Bench Press @ 135lb",  result:"11 reps", w1:"33",w5:"44",w7:"55"},
    {move:"Pull-Ups (BW)",         result:"13 reps", w1:"39",w5:"52",w7:"65"},
    {move:"RDL at 185lb",          result:"20 reps", w1:"60",w5:"80",w7:"100"},
    {move:"Hanging Knee Raises",   result:"20 reps", w1:"60",w5:"80",w7:"100"},
  ].map(b=>`<div style="padding:12px 0;border-bottom:1px solid #181818">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:13px;font-weight:bold">${b.move}</span>
      <span style="font-size:11px;color:#E8572A">${b.result}</span>
    </div>
    <div style="display:flex;gap:14px;font-size:11px;color:#555">
      <span>W1-4: <strong style="color:#ccc">${b.w1} reps</strong></span>
      <span>W5-6: <strong style="color:#2A7BE8">${b.w5} reps</strong></span>
      <span>W7: <strong style="color:#C12AE8">${b.w7} reps</strong></span>
    </div>
  </div>`).join('');
  return `
    <div class="label">Your Baselines</div>
    <div class="card">${rows}</div>
    <div class="card" style="margin-top:12px">
      <div class="card-label">Retest at Week 8</div>
      <div style="font-size:12px;color:#666;line-height:1.8">Drop volume 40% in Week 8 and retest all 4 movements. Your new max becomes the baseline for the next block. Knee raises will jump significantly — expect 10+ by Week 8.</div>
    </div>
    <div style="height:8px"></div>`;
}

function rLog(){
  const logs=getLogs();
  const do_=DAYS.map((d,i)=>`<option value="${i}">${d.day} - ${d.label}</option>`).join('');
  const wo=WEEKS.map((w,i)=>`<option value="${i}">Week ${w.week} - ${w.phase}</option>`).join('');
  const entries=logs.length===0
    ?'<div class="empty-log">No sessions logged yet.<br>Hit a workout and record it here.</div>'
    :[...logs].reverse().map((l,i)=>`<div class="log-entry">
        <div class="log-entry-header">
          <span class="log-entry-title">${l.dl} - W${l.w+1}</span>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="log-entry-date">${l.date}</span>
            <button class="delete-btn" onclick="delLog(${logs.length-1-i})">x</button>
          </div>
        </div>
        <div class="log-entry-body">${l.notes.replace(/\n/g,'<br>')}</div>
      </div>`).join('');
  return `
    <div class="label">Log a Session</div>
    <div style="padding:0 18px">
      <div class="log-form">
        <div class="log-meta"><select id="lw">${wo}</select><select id="ld">${do_}</select></div>
        <textarea id="ln" placeholder="What did you lift? Any PRs? How did it feel? Sleep quality?"></textarea>
        <button onclick="saveLog()">Save Session</button>
      </div>
    </div>
    <div class="label">Session History</div>
    <div style="padding:0 18px">${entries}</div>
    <div style="height:8px"></div>`;
}

function rRules(){
  const rules=["Don't change structure for 4 weeks minimum","Track every set — weight, reps, feel","Leave 1-2 reps in reserve most sets","Avoid emotional training — stick to the plan","New father = sleep over extra sets, always","Repeat before modifying anything","Progress feels boring before it feels impressive"];
  return `
    <div class="label">Non-Negotiables</div>
    <div class="card">${rules.map((r,i,a)=>`<div class="rule-row" style="${i===a.length-1?'border-bottom:none':''}"><span class="rule-dot">+</span>${r}</div>`).join('')}</div>
    <div class="card" style="margin-top:12px">
      <div class="card-label" style="color:#E8572A">Pec Tear Protocol</div>
      <div style="font-size:12px;color:#666;line-height:1.8">You are cleared to bench. Every session:<br><br>Stop bench 2-3 reps short of failure — always.<br>Control the descent, never bounce off chest.<br>Close-grip bench on Day 4 reduces pec stretch.<br>If top of press feels wrong, rack it and sub in dips.</div>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="card-label">This Plan</div>
      <div style="font-size:12px;color:#666;line-height:1.8"><strong style="color:#f0f0f0">2-5-15 structure</strong> — volume guardrails, 10-15 sets max, 45-60 min sessions.<br><br><strong style="color:#f0f0f0">Repetition Method progression</strong> — your baseline numbers set rep targets that scale automatically each week. Retest at Week 8, reset, repeat.</div>
    </div>
    <div style="height:8px"></div>`;
}

function showTab(t,b){ct=t;document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();}
function selW(i){aw=i;render();}
function selD(i){ad=i;render();document.getElementById('main-content').scrollTop=0;}
function saveLog(){
  const w=document.getElementById('lw'),d=document.getElementById('ld'),n=document.getElementById('ln').value.trim();
  if(!n)return;
  const l=getLogs();
  l.push({w:parseInt(w.value),dl:DAYS[parseInt(d.value)].day+' '+DAYS[parseInt(d.value)].label,notes:n,date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})});
  saveLogs(l);render();
}
function delLog(i){const l=getLogs();l.splice(i,1);saveLogs(l);render();}

if('serviceWorker' in navigator){
  const sw=`const C='tv2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./','.\/index.html']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
}
render();
</script>
